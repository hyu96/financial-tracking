services:
  - type: web
    name: financial-tracking-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install --production=false && npm run build
    startCommand: node dist/main
    preDeployCommand: npx prisma migrate deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
